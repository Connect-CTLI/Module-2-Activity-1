<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invigilation Role Challenge</title>
    <style>
        :root {
            --primary-navy: #1a1f5e;
            --secondary-blue: #185fa5;
            --accent-green: #3a6b22;
            --error-red: #a32d2d;
            --bg-light: #f4f7f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #d1d8e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .challenge-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 30px;
            text-align: center;
        }

        .progress-container {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--secondary-blue);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .card-counter {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* The Active Question Card */
        .duty-display {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--primary-navy);
            transition: transform 0.3s ease;
        }

        /* Interaction Buttons */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .role-btn {
            padding: 15px;
            border: 2px solid var(--secondary-blue);
            background: var(--white);
            color: var(--secondary-blue);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .role-btn:hover {
            background: var(--secondary-blue);
            color: var(--white);
        }

        /* Feedback Styles */
        .correct-anim { animation: pulseGreen 0.6s ease; }
        .wrong-anim { animation: shakeRed 0.5s ease; }

        @keyframes pulseGreen {
            0% { background: var(--white); }
            50% { background: #d4edda; border-color: var(--accent-green); }
            100% { background: var(--white); }
        }

        @keyframes shakeRed {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); background: #f8d7da; }
            75% { transform: translateX(10px); }
        }

        .summary-screen { display: none; }
        .summary-screen h2 { color: var(--primary-navy); }
    </style>
</head>
<body>

<div class="challenge-container" id="game-box">
    <div class="card-counter">Duty <span id="current-num">1</span> of 15</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="duty-card" class="duty-display">
        <!-- Text injected here -->
    </div>

    <div class="button-grid" id="controls">
        <button class="role-btn" onclick="checkAnswer('chief')">Chief Invigilator</button>
        <button class="role-btn" onclick="checkAnswer('invigilator')">Invigilator</button>
        <button class="role-btn" onclick="checkAnswer('both')">Both Roles</button>
    </div>

    <div id="summary" class="summary-screen">
        <h2>Activity Complete!</h2>
        <p>You have successfully assigned all invigilation duties.</p>
        <button class="role-btn" style="width:100%" onclick="location.reload()">Restart Activity</button>
    </div>
</div>

<script>
    const duties = [
        { text: "Ensure the examination venue is prepared at least two days before the examination.", ans: "chief" },
        { text: "Wear a name tag at all times.", ans: "both" },
        { text: "Check each candidate's proof of identity (ID or passport) and official Admission Letter.", ans: "invigilator" },
        { text: "Confirm the correct candidate-to-invigilator ratio of 1:30 is maintained.", ans: "chief" },
        { text: "Move continuously around the venue to supervise candidates while they write.", ans: "invigilator" },
        { text: "Escort candidates to the bathroom when necessary.", ans: "invigilator" },
        { text: "Open sealed question paper bags in front of the candidates and the principal.", ans: "chief" },
        { text: "Count all answer books before and after use.", ans: "invigilator" },
        { text: "Mark candidates as Present or Absent on the Script Control Register.", ans: "invigilator" },
        { text: "Confiscate unauthorised devices or materials and mark the answer script as IRREGULARITY.", ans: "invigilator" },
        { text: "Submit the irregularity report form (Annexure A) to the WCED Irregularity Unit.", ans: "chief" },
        { text: "Ensure no answer books — used, unused or spoilt — remain in the venue after the session.", ans: "invigilator" },
        { text: "Batch and package answer scripts after each session.", ans: "both" },
        { text: "Ensure the seating plan is displayed inside and outside the examination room.", ans: "chief" },
        { text: "Retrieve the sealed session bag in accordance with the required GLAM key procedure.", ans: "chief" }
    ];

    let currentIndex = 0;

    function loadCard() {
        if (currentIndex < duties.length) {
            document.getElementById('duty-card').innerText = duties[currentIndex].text;
            document.getElementById('current-num').innerText = currentIndex + 1;
            updateProgress();
        } else {
            showSummary();
        }
    }

    function checkAnswer(choice) {
        const display = document.getElementById('duty-card');
        if (choice === duties[currentIndex].ans) {
            display.classList.add('correct-anim');
            setTimeout(() => {
                display.classList.remove('correct-anim');
                currentIndex++;
                loadCard();
            }, 600);
        } else {
            display.classList.add('wrong-anim');
            setTimeout(() => {
                display.classList.remove('wrong-anim');
            }, 500);
        }
    }

    function updateProgress() {
        const percent = (currentIndex / duties.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    function showSummary() {
        document.getElementById('duty-card').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('summary').style.display = 'block';
        document.getElementById('progress-bar').style.width = '100%';
    }

    // Initialise
    loadCard();
</script>

</body>
</html>
